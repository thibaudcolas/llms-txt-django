# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
prompts:
  - "Read the local opencode.yml in the working directory and report the configured provider_id and model in one sentence."
  - "Output a Python function that prints the first 10 numbers in the Fibonacci sequence. Do not create any files. Just output the code."

providers:
  - id: opencode:sdk
    config:
      provider_id: openai
      model: gpt-4o-mini
      working_dir: evals

tests:
  - vars: {}
    assert:
      - type: contains
        value: openai
      - type: contains
        value: gpt-4o-mini
